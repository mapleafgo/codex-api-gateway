version: '3'

vars:
  BINARY: codex-api-gateway
  CONFIG: config.yaml
  PACKAGES: ./...
  VERSION:
    sh: git describe --tags 2>/dev/null || echo "dev"
  LDFLAGS: >-
    -w -s
    -X github.com/mapleafgo/codex-api-gateway/cmd/server.version={{.VERSION}}

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  build:
    desc: Build the server binary
    sources:
      - '**/*.go'
      - go.mod
      - go.sum
    generates:
      - '{{.BINARY}}'
    cmds:
      - go build -ldflags '{{.LDFLAGS}}' -o {{.BINARY}} ./cmd/server

  # ── CLI 交叉编译（对齐 singcast-cli 发布流程）──────────

  cli:
    desc: Build server binary for current platform
    cmds:
      - task: cli-linux-amd64

  cli-linux-amd64:
    desc: Build for Linux amd64
    cmds:
      - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags '{{.LDFLAGS}}' -o bin/{{.BINARY}}-linux-amd64 ./cmd/server

  cli-linux-arm64:
    desc: Build for Linux arm64
    cmds:
      - CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags '{{.LDFLAGS}}' -o bin/{{.BINARY}}-linux-arm64 ./cmd/server

  cli-darwin-amd64:
    desc: Build for macOS amd64
    cmds:
      - CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -trimpath -ldflags '{{.LDFLAGS}}' -o bin/{{.BINARY}}-darwin-amd64 ./cmd/server

  cli-darwin-arm64:
    desc: Build for macOS arm64
    cmds:
      - CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags '{{.LDFLAGS}}' -o bin/{{.BINARY}}-darwin-arm64 ./cmd/server

  cli-windows-amd64:
    desc: Build for Windows amd64
    cmds:
      - CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -trimpath -ldflags '{{.LDFLAGS}}' -o bin/{{.BINARY}}-windows-amd64.exe ./cmd/server

  cli-windows-arm64:
    desc: Build for Windows arm64
    cmds:
      - CGO_ENABLED=0 GOOS=windows GOARCH=arm64 go build -trimpath -ldflags '{{.LDFLAGS}}' -o bin/{{.BINARY}}-windows-arm64.exe ./cmd/server

  cli-all:
    desc: Build for all platforms
    cmds:
      - task: cli-linux-amd64
      - task: cli-linux-arm64
      - task: cli-darwin-amd64
      - task: cli-darwin-arm64
      - task: cli-windows-amd64
      - task: cli-windows-arm64

  run:
    desc: Run the server (requires {{.CONFIG}})
    cmds:
      - go run ./cmd/server -config {{.CONFIG}}

  test:
    desc: Run all tests
    cmds:
      - go test {{.PACKAGES}}

  test-race:
    desc: Run tests with the race detector
    cmds:
      - go test -race {{.PACKAGES}}

  test-verbose:
    desc: Run tests verbosely
    cmds:
      - go test -v {{.PACKAGES}}

  vet:
    desc: Run go vet
    cmds:
      - go vet {{.PACKAGES}}

  fmt:
    desc: Format Go code with gofmt
    cmds:
      - gofmt -w internal/ cmd/

  fmt-check:
    desc: Check formatting without writing (exits non-zero if unformatted)
    cmds:
      - gofmt -l internal/ cmd/

  tidy:
    desc: Run go mod tidy
    cmds:
      - go mod tidy

  cover:
    desc: Run tests with coverage and print the total
    cmds:
      - go test -coverprofile=coverage.out {{.PACKAGES}}
      - 'go tool cover -func=coverage.out | tail -1'

  check:
    desc: Run fmt-check + vet + test (pre-commit gate)
    cmds:
      - task: fmt-check
      - task: vet
      - task: test

  smoke:
    desc: Build then run the server for a manual smoke test
    cmds:
      - task: build
      - ./{{.BINARY}} -config {{.CONFIG}}

  install-autostart:
    desc: 安装桌面自启（~/.config/autostart + applications）
    deps: [build]
    cmds:
      - ./packaging/install-autostart.sh

  uninstall-autostart:
    desc: 移除桌面自启入口
    cmds:
      - ./packaging/uninstall-autostart.sh

