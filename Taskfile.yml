version: '3'

vars:
  BINARY: codex-api-gateway
  CONFIG: config.yaml

tasks:
  default:
    desc: Run task check
    cmds:
      - task: check

  build:
    desc: Build the server binary
    cmds:
      - go build -ldflags '-w -s' -o {{.BINARY}} ./cmd/server

  cli:
    desc: Build all cli binaries for all platforms
    deps:
      - cli-linux-amd64
      - cli-linux-arm64
      - cli-darwin-amd64
      - cli-darwin-arm64
      - cli-windows-amd64
      - cli-windows-arm64

  cli-linux-amd64:
    desc: Build cli binary for linux amd64
    cmds:
      - mkdir -p bin
      - GOOS=linux GOARCH=amd64 go build -ldflags '-w -s' -o bin/{{.BINARY}}-linux-amd64 ./cmd/server

  cli-linux-arm64:
    desc: Build cli binary for linux arm64
    cmds:
      - mkdir -p bin
      - GOOS=linux GOARCH=arm64 go build -ldflags '-w -s' -o bin/{{.BINARY}}-linux-arm64 ./cmd/server

  cli-darwin-amd64:
    desc: Build cli binary for darwin amd64
    cmds:
      - mkdir -p bin
      - GOOS=darwin GOARCH=amd64 go build -ldflags '-w -s' -o bin/{{.BINARY}}-darwin-amd64 ./cmd/server

  cli-darwin-arm64:
    desc: Build cli binary for darwin arm64
    cmds:
      - mkdir -p bin
      - GOOS=darwin GOARCH=arm64 go build -ldflags '-w -s' -o bin/{{.BINARY}}-darwin-arm64 ./cmd/server

  cli-windows-amd64:
    desc: Build cli binary for windows amd64
    cmds:
      - mkdir -p bin
      - GOOS=windows GOARCH=amd64 go build -ldflags '-w -s' -o bin/{{.BINARY}}-windows-amd64.exe ./cmd/server

  cli-windows-arm64:
    desc: Build cli binary for windows arm64
    cmds:
      - mkdir -p bin
      - GOOS=windows GOARCH=arm64 go build -ldflags '-w -s' -o bin/{{.BINARY}}-windows-arm64.exe ./cmd/server

  cli-all:
    desc: Build all cli binaries
    deps:
      - cli

  run:
    desc: Run the server (requires {{.CONFIG}})
    cmds:
      - go run ./cmd/server -config {{.CONFIG}}

  up:
    desc: 后台启动（-d，类似 docker compose up -d）；已在跑则先不动
    deps: [build]
    cmds:
      - |
        set -e
        f=${GATEWAY_PID_FILE:-gateway.pid}
        if [ -f "$f" ] && ps -p "$(tr -dc 0-9 < "$f")" >/dev/null 2>&1; then
          echo "up: already running pid=$(cat "$f")"
          exit 0
        fi
        ./{{.BINARY}} -config {{.CONFIG}} -d

  stop:
    desc: kill gateway.pid 指向的进程（无文件/进程不在也不失败）
    cmds:
      - sh -c 'f=${GATEWAY_PID_FILE:-gateway.pid}; p=$(cat "$f" 2>/dev/null) && /bin/kill "$p"; rm "$f" 2>/dev/null; true'

  restart:
    desc: stop 后后台启动（build + -d）；等待 /v1/models 与 gateway.pid
    cmds:
      - task: stop
      - task: build
      - |
        set -e
        PORT=$(grep -E '^[[:space:]]*listen:' {{.CONFIG}} | head -1 | sed -E 's/.*:([0-9]+).*/\1/')
        PORT=${PORT:-9870}
        ./{{.BINARY}} -config {{.CONFIG}} -d
        code=000
        for _ in $(seq 1 80); do
          code=$(curl -sS -o /dev/null -w '%{http_code}' --connect-timeout 1 "http://127.0.0.1:${PORT}/v1/models" 2>/dev/null || echo 000)
          if [ "$code" = "200" ] && [ -f "${GATEWAY_PID_FILE:-gateway.pid}" ]; then
            echo "restart: OK http=200 pid=$(cat ${GATEWAY_PID_FILE:-gateway.pid})"
            exit 0
          fi
          sleep 0.25
        done
        echo "restart: FAIL last_http=$code" >&2
        exit 1

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  test-race:
    desc: Run all tests with race detector
    cmds:
      - go test -race ./...

  test-verbose:
    desc: Run all tests verbose
    cmds:
      - go test -v ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  fmt:
    desc: Format go code
    cmds:
      - gofmt -w cmd/ internal/

  fmt-check:
    desc: Check go code format
    cmds:
      - gofmt -l cmd/ internal/ | diff - /dev/null

  tidy:
    desc: go mod tidy
    cmds:
      - go mod tidy

  cover:
    desc: Generate coverage report
    cmds:
      - go test -coverprofile=coverage.out ./...
      - go tool cover -func=coverage.out

  check:
    desc: Run all check before commit
    deps:
      - fmt-check
      - vet
      - test
    cmds: []

  smoke:
    desc: Smoke test binary
    deps: [build]
    cmds:
      - ./{{.BINARY}} -config {{.CONFIG}}

  install-autostart:
    desc: 安装桌面自启（~/.config/autostart + applications）
    deps: [build]
    cmds:
      - ./packaging/install-autostart.sh

  uninstall-autostart:
    desc: 移除桌面自启入口
    cmds:
      - ./packaging/uninstall-autostart.sh
