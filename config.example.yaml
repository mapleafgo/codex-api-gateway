# =============================================================================
# CodexApiGateway 配置示例
# -----------------------------------------------------------------------------
# 作用：把 Codex CLI 发来的 OpenAI Responses API 请求，转换为 Anthropic
#       Messages API 请求，转发给任一 Anthropic 兼容后端（官方 Claude /
#       智谱 / Kimi / 方舟等），并做主备故障转移 + 断路器保护。
# 约定：api_key 支持 ${ENV_VAR} 从环境变量展开，避免明文密钥入库。
# 也可用 CODEX_API_GATEWAY_ 前缀环境变量覆盖配置，层级分隔符用双下划线。
# 例如：CODEX_API_GATEWAY_SOURCES__0__API_KEY=sk-ant-...
# =============================================================================

# HTTP 服务
server:
  listen: ":8383"        # 监听地址；Codex 的 base_url 指向 http://<host>:8383/v1

# 日志配置
# level: debug | info | warn | error
# format: text | json
# file: 非空时日志写入该文件（追加），为空写 stderr。排查时配合 level: debug。
# debug 会输出输入项、流式事件、SSE 转换等细粒度诊断日志。
logging:
  level: info
  format: text
  # file: gateway.log

# 全局断路器（所有后端源共享，可被单源 breaker 覆盖）
# 状态机：
#   normal ──(连续 N 次失败)──> degraded(该源序列后移) ──(再连续 N 次失败)──> circuitOpen(熔断)
#   circuitOpen ──(冷却结束)──> halfOpen(放行探测) ──(探测成功)──> 由 recovery 决定回到 normal/degraded
breaker:
  first_byte_timeout: 12s   # 流式请求等待首个字节的最长时间，超时计为失败
  degrade_threshold: 3      # normal→degraded 与 degraded→circuitOpen 各需的连续失败次数
  recover_threshold: 1      # degraded→normal 所需的连续成功次数
  cooldown: 30s             # 熔断(circuitOpen)后多久转为半开(halfOpen)探测
  half_open_probes: 1       # halfOpen 状态允许放行的探测请求数
  recovery: normal          # halfOpen 探测成功后恢复到 normal | degraded
  max_retries: 0            # 失败重试次数；仅全局生效，不被单源 breaker 覆盖

# prompt cache（system / tools / messages 历史的缓存时效，降低多轮重复计费）
# ttl: 5m（默认，适合连续多轮）| 1h（适合两轮间隔 >5m 的长任务）
cache:
  ttl: 5m

#
# 网关级指令补强：内容来自一个文本文件（base_instructions_file），作为 Codex
# ModelInfo 的 base_instructions 返回。非空时整体替换 Codex 内置 BASE_INSTRUCTIONS，
# 由 Codex 客户端注入到 system 前缀（prompt cache 友好，无需每个上游请求重传）。
# 文件内容通常 = 官方 base_instructions + 网关 gateway_guidance 段（如 skill 加载纪律）。
# 取代已废弃的 system_suffix（转换层追加 system block，每请求重传，cache 不友好）。
# 解开下面注释即可启用：
# base_instructions_file: base_instructions.md

# /v1/models 暴露的模型表。key 是模型 slug（即客户端可用的模型名），value 是
# per-slug 能力覆盖；只返回在此显式列出的模型，不合并上游 /v1/models 列表，
# 也不暴露 sources.model_map 的别名。
# 网关不向上游拉取模型列表，context_window 等能力字段必须在此显式补充。
# 仅 context_window / supports_image 可 per-slug 覆盖；其余能力
# （search_tool / parallel_tool_calls / reasoning_summaries / web_search_tool_type /
# input_modalities / use_responses_lite 等）由 codexModelInfo 硬编码统一注入。
# models:
#   gpt-5.5:                        # slug，客户端请求时使用的模型名
#     context_window: 200000        # 最大上下文 token 数（同步到 max_context_window）
#     # supports_image: false       # 是否支持图片识别（原尺寸 detail，默认 false）
#   glm-5.2:
#     context_window: 131072

# 后端源列表（顺序即优先级：第一个为主用，其余依次作为主备故障转移的备用源）
# base_url 只写到网关根地址（不含 /v1/messages），代码内部统一补全该路径。
# 各 Anthropic 兼容后端根地址不同：官方 https://api.anthropic.com，
# 智谱 https://open.bigmodel.cn/api/anthropic，Messages 路径同为 /v1/messages。
sources:
  - name: anthropic-official                # 源标识，用于日志与故障转移定位
    base_url: https://api.anthropic.com     # 网关根地址，代码自动补 /v1/messages
    api_key: ${ANTHROPIC_KEY}               # 密钥，支持 ${ENV_VAR} 展开
    model_map: { gpt-5: claude-sonnet-4-20250514 }  # 请求 model → 后端 model 映射
    default_model: claude-sonnet-4-20250514 # 未命中 model_map 时的兜底模型（如 Codex 的 gpt-5.5）

  # 备用源：演示 per-source 断路器覆盖（整个 breaker 块可选，省略即用全局）
  # 单源 breaker 中为零值的字段会继承全局；max_retries 始终取全局、不被覆盖。
  - name: zhipu
    base_url: https://open.bigmodel.cn/api/anthropic
    api_key: ${ZHIPU_KEY}
    model_map: { gpt-5: glm-5.2 }
    default_model: glm-5.2
    breaker:
      first_byte_timeout: 8s    # 该源更快判定首字节超时，其余字段继承全局

  # 备用源：演示 OpenAI Chat 兼容上游（取消注释使用）
  #- name: openai-compat
  #  base_url: https://api.openai.com/v1
  #  api_key: ${OPENAI_API_KEY}
  #  backend_type: c
  #  model_map: { gpt-5: gpt-4o }
  #  default_model: gpt-4o
      cooldown: 10s