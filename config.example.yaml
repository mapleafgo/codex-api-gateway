# =============================================================================
# CodexApiGateway 配置示例
# -----------------------------------------------------------------------------
# 作用：把 Codex CLI 发来的 OpenAI Responses API 请求，转换为 Anthropic
#       Messages API 请求，转发给任一 Anthropic 兼容后端（官方 Claude /
#       智谱 / Kimi / 方舟等），并做主备故障转移 + 断路器保护。
# 约定：api_key 支持 ${ENV_VAR} 从环境变量展开，避免明文密钥入库。
# 也可用 CODEX_API_GATEWAY_ 前缀环境变量覆盖配置，层级分隔符用双下划线。
# 例如：CODEX_API_GATEWAY_SOURCES__0__API_KEY=sk-ant-...
# =============================================================================

# HTTP 服务
server:
  listen: ":8080"        # 监听地址；Codex 的 base_url 指向 http://<host>:8080/v1

# 日志配置
# level: debug | info | warn | error
# format: text | json
# file: 非空时日志写入该文件（追加），为空写 stderr。排查时配合 level: debug。
# debug 会输出输入项、流式事件、SSE 转换、会话保存等细粒度诊断日志。
logging:
  level: info
  format: text
  # file: gateway.log

# 会话状态存储
# enrich 机制：按 previous_response_id 缓存本轮有效 input + output，
# 下一轮回填完整上下文，使无状态后端也能正确完成多轮对话和工具调用。
session:
  path: data/session             # Badger 存储目录；留空 = 默认 data/session
  ttl: 1h                        # Badger entry TTL，过期后不可读取并等待 GC
  max_bytes: 67108864            # 会话缓存总字节预算；0/留空 = 默认 64 MiB
  max_entry_bytes: 2097152       # 单条响应可缓存的最大字节数；0/留空 = 默认 2 MiB

# 全局断路器（所有后端源共享，可被单源 breaker 覆盖）
# 状态机：
#   normal ──(连续 N 次失败)──> degraded(该源序列后移) ──(再连续 N 次失败)──> circuitOpen(熔断)
#   circuitOpen ──(冷却结束)──> halfOpen(放行探测) ──(探测成功)──> 由 recovery 决定回到 normal/degraded
breaker:
  first_byte_timeout: 12s   # 流式请求等待首个字节的最长时间，超时计为失败
  degrade_threshold: 3      # normal→degraded 与 degraded→circuitOpen 各需的连续失败次数
  recover_threshold: 1      # degraded→normal 所需的连续成功次数
  cooldown: 30s             # 熔断(circuitOpen)后多久转为半开(halfOpen)探测
  half_open_probes: 1       # halfOpen 状态允许放行的探测请求数
  recovery: normal          # halfOpen 探测成功后恢复到 normal | degraded
  max_retries: 0            # 失败重试次数；仅全局生效，不被单源 breaker 覆盖

# thinking 预算映射：reasoning.effort → Anthropic thinking.budget_tokens
# - effort 为空：不开启 thinking
# - effort=none：显式禁用 thinking（不查此表）
# - 其他 effort：查此表取 budget，未命中则取默认值 8000
thinking:
  effort_budget: {minimal: 1024, low: 8000, medium: 16000, high: 32000, xhigh: 48000}

# prompt cache（system / tools / messages 历史的缓存时效，降低多轮重复计费）
# ttl: 5m（默认，适合连续多轮）| 1h（适合两轮间隔 >5m 的长任务）
cache:
  ttl: 5m

# 是否把 OpenAI 请求里的 service_tier 透传到 Anthropic（仅 auto/default 映射到
# Anthropic 支持的 service_tier；flex/scale/priority 无等价能力，会输出 WARN 并忽略）
service_tier_passthrough: false

# 网关级指令补强：在转换后的 Anthropic system 末尾追加一段文本（独立 TextBlockParam），
# 对所有后端源生效。补强模型的指令遵循：例如强制先调用 tool_search 发现 skill，
# 再处理用户请求。独立块不加 cache_control，前面 system 块的缓存断点不受影响。
# 部分兼容后端（如 GLM）指令遵循弱，看到 Skills 列表不会主动 sed 读取 SKILL.md
# 全文，导致 skill 机制失效。skill 的发现靠 system prompt 里的 skills_instructions
# 触发，加载靠模型主动 sed/cat，与 tool_search（发现 deferred MCP 工具）是两套机制。
# 解开下面注释即可启用 skill 加载引导：
# system_suffix: |
#   <gateway_guidance>
#   Skills are referenced by NAME in the Skills list above, but their bodies
#   live on disk and are NOT in your context yet. A skill name + its one-line
#   description is NOT enough to use the skill correctly — you MUST read the
#   full SKILL.md before following it.
#
#   Skill loading discipline (follow strictly, before ANY task action):
#   1. Read `using-superpowers/SKILL.md` first on every task — it defines how
#      to discover and invoke skills. Then read its `references/codex-tools.md`.
#   2. Scan the Skills list above. For ANY skill whose description could match
#      this task (even 1% chance), run `sed -n '1,260p' <skill_path>/SKILL.md`
#      and read it COMPLETELY before continuing. Do not skim. If truncated,
#      read the next 260-line slice until EOF.
#   3. Multiple skills often apply together: a process skill (brainstorming /
#   systematic-debugging / test-driven-development) PLUS one or more domain
#   skills (docx, vue, coding-principles, ...). Load ALL that apply, not just
#   the first.
#   4. Only after reading each relevant SKILL.md may you proceed. Announce
#      "Using <skill> to <purpose>" and follow its workflow exactly.
#   5. NEVER proceed to implementation while a relevant skill is still unread.
#   Missing a skill is a failure.
#
#   `tool_search` is a DIFFERENT mechanism — it discovers deferred MCP tools
#   (Adobe, Sites, browser, ...), NOT skills. Do not conflate the two.
#   </gateway_guidance>

# per-slug 模型能力覆盖表（key 是模型 slug，对应 /v1/models 返回的条目）。
# 上游 Anthropic 兼容后端 /v1/models 只返回 id/display_name/created_at，
# 不提供 context_window 等能力字段，需在此显式补充。
# 未列出的字段保持 codexModelInfo 内置默认（见 internal/server/server.go）。
# 仅覆盖显式给出的字段，其余字段保留默认值。
# models:
#   gpt-5.5:                   # slug，来自 model_map 的 key 或上游模型 ID
#     context_window: 200000   # 最大上下文 token 数（自动同步到 max_context_window）
#     effective_context_window_percent: 90   # 输入 token 占上下文窗口的百分比
#     # auto_compact_token_limit: 180000     # 自动压缩阈值，默认取 context_window*0.9
#     # display_name: "GPT-5.5"              # 显示名
#     # supports_search_tool: true           # 启用 tool_search + MCP deferred
#     # supports_parallel_tool_calls: true
#     # supports_reasoning_summaries: true
#   glm-5.2:
#     context_window: 131072

# 后端源列表（顺序即优先级：第一个为主用，其余依次作为主备故障转移的备用源）
# base_url 只写到网关根地址（不含 /v1/messages），代码内部统一补全该路径。
# 各 Anthropic 兼容后端根地址不同：官方 https://api.anthropic.com，
# 智谱 https://open.bigmodel.cn/api/anthropic，Messages 路径同为 /v1/messages。
sources:
  - name: anthropic-official                # 源标识，用于日志与故障转移定位
    base_url: https://api.anthropic.com     # 网关根地址，代码自动补 /v1/messages
    api_key: ${ANTHROPIC_KEY}               # 密钥，支持 ${ENV_VAR} 展开
    model_map: { gpt-5: claude-sonnet-4-20250514 }  # 请求 model → 后端 model 映射
    default_model: claude-sonnet-4-20250514 # 未命中 model_map 时的兜底模型（如 Codex 的 gpt-5.5）

  # 备用源：演示 per-source 断路器覆盖（整个 breaker 块可选，省略即用全局）
  # 单源 breaker 中为零值的字段会继承全局；max_retries 始终取全局、不被覆盖。
  - name: zhipu
    base_url: https://open.bigmodel.cn/api/anthropic
    api_key: ${ZHIPU_KEY}
    model_map: { gpt-5: glm-5.2 }
    default_model: glm-5.2
    breaker:
      first_byte_timeout: 8s    # 该源更快判定首字节超时，其余字段继承全局
      cooldown: 10s
